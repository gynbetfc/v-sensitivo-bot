name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install Buildozer
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip openjdk-17-jdk autoconf libtool
        pip install buildozer cython
    
    - name: Build APK
      run: |
        cd apk
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: tesla369-apk
        path: apk/bin/*.apk
