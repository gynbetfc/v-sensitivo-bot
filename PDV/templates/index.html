<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>PDV Inteligente v6.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ============================================================
           CSS COMPLETO - PDV HÍBRIDO v6.0
           ============================================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #16162e;
            --bg-card-hover: #1e1e3a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0c0;
            --text-muted: #6a6a8a;
            --border-color: #2a2a4a;
            --green: #22c55e;
            --green-dark: #16a34a;
            --blue: #3b82f6;
            --purple: #8b5cf6;
            --orange: #f59e0b;
            --red: #ef4444;
            --radius: 12px;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--green); border-radius: 10px; }

        /* ============================================================
           TOAST
           ============================================================ */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 360px;
            pointer-events: none;
        }
        .toast {
            background: rgba(22, 22, 46, 0.95);
            backdrop-filter: blur(12px);
            border-radius: var(--radius);
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideInRight 0.4s ease;
            border-left: 4px solid;
            pointer-events: auto;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }
        .toast-hide { transform: translateX(120%); opacity: 0; }
        .toast-success { border-left-color: var(--green); }
        .toast-error { border-left-color: var(--red); }
        .toast-warning { border-left-color: var(--orange); }
        .toast-info { border-left-color: var(--blue); }
        .toast-icon { font-size: 18px; flex-shrink: 0; }
        .toast-content { flex: 1; min-width: 0; }
        .toast-title { font-weight: 600; font-size: 13px; color: #fff; margin-bottom: 2px; }
        .toast-message { font-size: 12px; color: var(--text-secondary); }
        .toast-close {
            cursor: pointer;
            color: var(--text-muted);
            font-size: 16px;
            padding: 0 4px;
            background: none;
            border: none;
            transition: var(--transition);
        }
        .toast-close:hover { color: #fff; }
        @keyframes slideInRight {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* ============================================================
           AUTH - LOGIN / REGISTER
           ============================================================ */
        .auth-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            background: var(--bg-primary);
            padding: 20px;
        }
        .auth-page.hidden { display: none; }
        .auth-box {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 40px;
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            animation: fadeUp 0.5s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auth-box .logo { text-align: center; font-size: 48px; margin-bottom: 4px; display: block; }
        .auth-box h1 { text-align: center; font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .auth-box .sub { text-align: center; color: var(--text-secondary); font-size: 13px; margin-bottom: 24px; }
        .auth-box .form-group { margin-bottom: 14px; }
        .auth-box .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .auth-box .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            transition: var(--transition);
            background: var(--bg-primary);
            color: #fff;
        }
        .auth-box .form-group input:focus {
            outline: none;
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
        }
        .auth-box .form-group input::placeholder { color: var(--text-muted); }
        .auth-box .form-group .hint {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .auth-box .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--green);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 4px;
        }
        .auth-box .btn-primary:hover {
            background: var(--green-dark);
            transform: translateY(-1px);
        }
        .auth-box .btn-primary:active { transform: translateY(0); }
        .auth-box .auth-link {
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 16px;
        }
        .auth-box .auth-link span {
            color: var(--green);
            cursor: pointer;
            font-weight: 600;
        }
        .auth-box .auth-link span:hover { text-decoration: underline; }
        .auth-box .msg {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 12px;
            display: none;
        }
        .auth-box .msg.success { display: block; background: rgba(34, 197, 94, 0.15); color: var(--green); }
        .auth-box .msg.error { display: block; background: rgba(239, 68, 68, 0.15); color: var(--red); }

        /* ============================================================
           APP PRINCIPAL
           ============================================================ */
        .app {
            display: none;
            width: 100%;
            max-width: 1440px;
            min-height: 100vh;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .app.active { display: block; animation: fadeUp 0.4s ease; }

        /* ===== HEADER ===== */
        .header {
            background: var(--bg-card);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header .logo { font-size: 18px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 8px; }
        .header .logo span { color: var(--green); }
        .header .user {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .header .user .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--green);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: #fff;
        }
        .header .user .db-id {
            font-size: 10px;
            color: var(--text-muted);
            background: var(--bg-primary);
            padding: 2px 10px;
            border-radius: 10px;
            font-family: monospace;
            cursor: pointer;
            transition: var(--transition);
        }
        .header .user .db-id:hover { background: var(--border-color); }
        .header .user .status-caixa {
            padding: 3px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .header .user .status-caixa.aberto { background: rgba(34, 197, 94, 0.2); color: var(--green); }
        .header .user .status-caixa.fechado { background: rgba(239, 68, 68, 0.2); color: var(--red); }
        .header .user .btn-sair {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 12px;
        }
        .header .user .btn-sair:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .header .user .btn-sync {
            background: var(--blue);
            border: none;
            color: #fff;
            padding: 6px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 12px;
            font-weight: 600;
        }
        .header .user .btn-sync:hover { background: #2563eb; }

        .menu-toggle { display: none; background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; }

        /* ===== NAV ===== */
        .nav {
            background: var(--bg-card);
            padding: 6px 16px;
            display: flex;
            gap: 4px;
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            flex-wrap: nowrap;
        }
        .nav::-webkit-scrollbar { display: none; }
        .nav button {
            padding: 8px 18px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            border-radius: 8px;
            transition: var(--transition);
            color: var(--text-secondary);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .nav button:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .nav button.active {
            color: #fff;
            background: rgba(34, 197, 94, 0.15);
        }
        .nav button .badge { background: var(--red); color: #fff; font-size: 9px; padding: 1px 8px; border-radius: 10px; font-weight: 700; }

        /* ===== CONTENT ===== */
        .content { padding: 16px; }
        .panel { display: none; animation: fadeUp 0.3s ease; }
        .panel.active { display: block; }

        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px;
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }
        .card:hover { border-color: rgba(34, 197, 94, 0.2); }
        .card h3 {
            font-size: 16px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
        }
        .card h3 .btn-excluir-produto {
            margin-left: auto;
            background: var(--red);
            color: #fff;
            border: none;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
        }
        .card h3 .btn-excluir-produto:hover { background: #dc2626; }

        /* ============================================================
           PDV - VENDAS
           ============================================================ */
        .pdv-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 16px;
        }
        .pdv-grid .input-group { margin-bottom: 10px; }
        .pdv-grid .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .pdv-grid .input-group input {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            transition: var(--transition);
            background: var(--bg-primary);
            color: #fff;
        }
        .pdv-grid .input-group input:focus {
            outline: none;
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
        }
        .pdv-grid .input-group input[readonly] { 
            color: var(--text-secondary);
            background: var(--bg-primary);
            cursor: not-allowed;
        }
        .pdv-grid .btn-buscar {
            width: 100%;
            padding: 9px;
            background: rgba(59, 130, 246, 0.15);
            color: var(--blue);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
            margin-bottom: 8px;
        }
        .pdv-grid .btn-buscar:hover { background: rgba(59, 130, 246, 0.25); }
        .pdv-grid .status-msg {
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 10px;
            background: var(--bg-primary);
            color: var(--text-secondary);
        }
        .pdv-grid .status-msg.success { color: var(--green); background: rgba(34, 197, 94, 0.1); }
        .pdv-grid .status-msg.error { color: var(--red); background: rgba(239, 68, 68, 0.1); }
        .pdv-grid .btn-finalizar {
            width: 100%;
            padding: 14px;
            background: var(--green);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }
        .pdv-grid .btn-finalizar:hover { background: var(--green-dark); }
        .pdv-grid .btn-finalizar:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ===== RESULTADOS DA BUSCA ===== */
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 50;
            display: none;
            margin-top: 4px;
            box-shadow: var(--shadow);
        }
        .search-results.active { display: block; }
        .search-results .result-item {
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: var(--transition);
        }
        .search-results .result-item:hover,
        .search-results .result-item.active {
            background: rgba(34, 197, 94, 0.1);
        }
        .search-results .result-item .name { font-size: 13px; }
        .search-results .result-item .price { 
            font-size: 13px; 
            font-weight: 600;
            color: var(--green);
        }
        .search-results .result-item .stock {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* ===== CARRINHO ===== */
        .cart-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .cart-table th {
            text-align: left;
            padding: 6px 4px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 10px;
            text-transform: uppercase;
        }
        .cart-table td { padding: 6px 4px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .cart-table .qty { text-align: center; }
        .cart-table .qty button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            padding: 0 4px;
        }
        .cart-table .qty button:hover { color: #fff; }
        .cart-table .price { text-align: right; }
        .cart-table .total-item { text-align: right; font-weight: 600; }
        .cart-table .btn-remove {
            background: none;
            border: none;
            color: var(--red);
            cursor: pointer;
            font-size: 14px;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .cart-table .btn-remove:hover { background: rgba(239, 68, 68, 0.1); }
        .empty-cart { text-align: center; color: var(--text-muted); padding: 24px 0; font-size: 13px; }

        .cart-summary {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }
        .cart-summary .row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            font-size: 13px;
            align-items: center;
        }
        .cart-summary .row.total {
            font-size: 18px;
            font-weight: 700;
            color: var(--green);
            padding-top: 6px;
            border-top: 1px solid var(--border-color);
            margin-top: 4px;
        }
        .cart-summary .row input {
            width: 70px;
            padding: 3px 6px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 13px;
            background: var(--bg-primary);
            color: #fff;
            text-align: right;
        }
        .cart-summary .row input:focus { outline: none; border-color: var(--green); }

        /* ============================================================
           PAGAMENTO PROFISSIONAL
           ============================================================ */
        .payment-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 9999;
